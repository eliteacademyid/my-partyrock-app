name: Deploy Concept Explainer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build --template infra/template.yaml

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name concept-explainer-master-any-topic \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region us-east-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Inject URLs into frontend
        run: |
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name concept-explainer-master-any-topic \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }

          DIAGRAM_URL=$(get_output DiagramApiUrl)
          sed -i "s|__DIAGRAM_API_URL__|$DIAGRAM_URL|g" frontend/index.html

          URL=$(get_output ConceptExplanationUrl)
          sed -i "s|__URL_CONCEPT_EXPLANATION__|$URL|g" frontend/index.html

          URL=$(get_output RealWorldExamplesAndAnalogiesUrl)
          sed -i "s|__URL_REAL_WORLD_EXAMPLES_AND_ANALOGIES__|$URL|g" frontend/index.html

          URL=$(get_output KeyTermsVocabularyUrl)
          sed -i "s|__URL_KEY_TERMS_VOCABULARY__|$URL|g" frontend/index.html

          URL=$(get_output StudyTipsNextStepsUrl)
          sed -i "s|__URL_STUDY_TIPS_NEXT_STEPS__|$URL|g" frontend/index.html

          URL=$(get_output RelatedConceptsToExploreUrl)
          sed -i "s|__URL_RELATED_CONCEPTS_TO_EXPLORE__|$URL|g" frontend/index.html

          URL=$(get_output PracticeQuizUrl)
          sed -i "s|__URL_PRACTICE_QUIZ__|$URL|g" frontend/index.html

          URL=$(get_output FollowUpQuestionsUrl)
          sed -i "s|__URL_FOLLOW_UP_QUESTIONS__|$URL|g" frontend/index.html

      - name: Sync frontend to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name concept-explainer-master-any-topic \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          aws s3 sync frontend/ s3://$BUCKET/ --cache-control no-cache --delete
